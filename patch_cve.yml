- name: Retrieve hosts from Ledger Pro
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    cve: ""
    ledger_url: ""
  tasks:
    - name: Validate CVE format
      ansible.builtin.assert:
        that:
          - cve != ''
          - (cve | upper) is match('^CVE-[0-9]{4}-[0-9]{4,7}$')
          - ledger_url != ''
        fail_msg: >
          Invalid CVE format. Expected CVE-YYYY-NNNN through CVE-YYYY-NNNNNNN.

    - name: Validate Ledger base URL
      ansible.builtin.assert:
        that:
          - ledger_url != ''
          - ledger_url is match('^https?://(([A-Za-z0-9-]+\.)+[A-Za-z]{2,}|([0-9]{1,3}\.){3}[0-9]{1,3})(:[0-9]{1,5})?$')
        fail_msg: >
          API base URL must be http:// or https:// followed by a domain,
          subdomain, or IPv4 address, optionally with a port, and must not
          end with a slash.

    - name: Connect to Ascender Pro to retreive 
      ansible.builtin.uri:
        url: "{{ ledger_url }}/api/v1/errata/cve/{{ cve | upper }}/"
        method: GET
        user: "{{ username }}"
        password: "{{ password }}"
        force_basic_auth: true
        status_code: [200, 404]
      register: cve_data

    - set_fact:
        hosts: none

    - ansible.builtin.meta: end_play
      when: | 
        cve_data.status == 404 or
        cve_data.json is undefined or
        cve_data.json.hosts is undefined or
        cve_data.json.hosts | length > 0 or
        cve_data.json.rpms is undefined or
        cve_data.json.rpms | length > 0

    - set_fact:
        hosts: "{{ cve_data.json.hosts | select('in', hostvars.keys() | list) | list }}"
        packages: "{{ cve_data.json.rpms | flatten }}"

- name: Update vulnerable packages
  hosts: "{{ hostvars['localhost'].hosts }}"
  become: true
  tasks:
    - name: Gather Package Facts before patching
      ansible.builtin.package_facts:
        manager: auto
      when: ansible_os_family != 'Windows'

    - name: Install Updates
      ansible.builtin.dnf:
        name: "{{ hostvars['localhost'].packages | select('in', ansible_facts.packages.keys() | list) | list }}"
        state: latest
      register: updates

    - name: Gather Package Facts after patching
      ansible.builtin.package_facts:
        manager: auto
      when: ansible_os_family != 'Windows'
